{% extends 'base_admin_sidebar.html' %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Edit Fee Assignment</h2>
        <a href="{% url 'fee_assignment_list' %}" class="btn btn-outline-secondary">Back to Fees</a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <p class="text-muted">Updating the amount refreshes the class fee baseline while preserving any student-specific discounts or waivers already applied in this term.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-success">Update</button>
                    <a href="{% url 'fee_assignment_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
